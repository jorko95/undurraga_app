<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2380E0">
<title>Árbol de Detenciones · Undurraga · mtsolutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:#434448;background:#F5F6F8;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
:root{
  --mts-blue:#2380E0;--mts-orange:#FC8021;--mts-ink:#434448;
  --mts-success:#22A06B;--mts-success-bg:#E6F6EE;
  --mts-danger:#E5484D;--mts-danger-bg:#FCEAEA;
  --mts-warning:#F5A524;--mts-warning-bg:#FFF4DE;
  --surface:#FFFFFF;--bg-3:#FAFBFC;--bg:#F5F6F8;--bg-2:#F0F2F5;
  --line:#E5E8EE;--ink-4:#C3C8D0;--ink-3:#9097A1;--ink-2:#6B6E76;
  --font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}

/* full-screen app, no card frame on real device */
.app-root{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

.appbar{height:52px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
.appbar-logo{display:flex;align-items:center;flex:1;min-width:0}
.appbar-logo svg{height:20px;width:auto;display:block}
.tab-pill{font-size:10px;color:var(--ink-2);background:var(--bg-2);padding:3px 8px;border-radius:999px;flex-shrink:0}

.subbar{display:flex;background:var(--surface);border-bottom:1px solid var(--line);padding:0 10px;flex-shrink:0}
.subtab{flex:1;text-align:center;padding:11px 4px;font-size:13px;font-weight:500;color:var(--ink-3);border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 150ms}
.subtab.on{color:var(--mts-blue);border-bottom-color:var(--mts-blue)}
.subtab i{font-size:18px}

.scroll-area{flex:1;overflow-y:auto;padding:14px 14px calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}

.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}
.stat-n{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
.stat-l{font-size:9px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-top:3px}
.stat-ok{color:var(--mts-success)}.stat-wn{color:var(--mts-warning)}.stat-er{color:var(--mts-danger)}

.fam-section{margin-bottom:14px}
.fam-toggle{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fam-toggle.exp{border-radius:12px 12px 0 0;border-bottom:none}
.fam-stripe{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.fam-name{font-size:13px;font-weight:600;color:var(--mts-ink);flex:1;text-transform:uppercase;letter-spacing:0.02em}
.fam-count{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.fam-chev{font-size:16px;color:var(--ink-3);transition:transform 200ms;flex-shrink:0}
.fam-chev.up{transform:rotate(180deg)}

.fam-body{background:var(--surface);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:6px 10px 10px;display:none}
.fam-body.show{display:block}

.grp-block{margin-top:10px}
.grp-label{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;padding:4px 4px;display:flex;align-items:center;gap:4px}

.code-row{display:flex;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid var(--bg-2);-webkit-tap-highlight-color:transparent}
.code-row:last-child{border-bottom:none}
.code-id{font-size:10px;font-weight:600;font-family:var(--mono);color:var(--ink-2);width:28px;flex-shrink:0}
.code-name{font-size:12.5px;color:var(--mts-ink);flex:1;line-height:1.35}
.code-badges{display:flex;align-items:center;gap:5px;flex-shrink:0}
.mant-flag{font-size:14px;color:var(--ink-3)}
.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.st-activo{background:var(--mts-success)}.st-nuevo{background:var(--mts-warning)}.st-desact{background:var(--mts-danger)}

.legend-row{display:flex;align-items:center;gap:10px;padding:8px 4px 12px;flex-wrap:wrap}
.legend-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-2)}

.add-btn-row{display:flex;gap:8px;margin-top:6px;margin-bottom:14px}
.tap-btn{flex:1;height:42px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:12px;font-weight:500;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent}
.tap-btn:active{background:var(--bg-2)}
.tap-btn.primary{background:var(--mts-orange);color:#fff;border:none}
.tap-btn.primary:active{opacity:.85}

.op-line-bar{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--ink-2);display:flex;align-items:center;justify-content:space-between}
.op-line-bar b{color:var(--mts-ink);font-weight:600}

.step-block{margin-bottom:14px}
.step-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;border:1.5px solid var(--line);background:var(--bg-2);color:var(--ink-2)}
.step-circle.act{background:var(--mts-orange);color:#fff;border-color:var(--mts-orange)}
.step-circle.dn{background:var(--mts-success-bg);color:var(--mts-success);border-color:var(--mts-success)}
.step-text{font-size:13px;font-weight:500;color:var(--ink-2)}
.step-text.act{color:var(--mts-ink);font-weight:600}
.step-line{width:1.5px;height:10px;background:var(--line);margin-left:13px}

.bigselect-wrap{position:relative}
.bigselect{width:100%;height:50px;padding:0 38px 0 16px;border:1.5px solid var(--line);border-radius:14px;background:var(--surface);color:var(--ink-2);font-size:15px;font-family:var(--font);appearance:none;-webkit-appearance:none}
.bigselect:focus{outline:none;border-color:var(--mts-blue)}
.bigselect.filled{color:var(--mts-ink);font-weight:500;border-color:var(--ink-4)}
.bigselect-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--ink-3);pointer-events:none}

.crumb-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.crumb{font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px}
.crumb-sep{font-size:11px;color:var(--ink-4)}

.confirm-block{background:var(--surface);border:1.5px solid var(--mts-success);border-radius:14px;padding:16px}
.confirm-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.confirm-circle{width:38px;height:38px;border-radius:50%;background:var(--mts-success-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.confirm-title{font-size:14px;font-weight:600;color:var(--mts-ink);line-height:1.3}
.confirm-sub{font-size:11px;color:var(--ink-2);margin-top:2px}
.confirm-rows{border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:6px}
.crow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--bg-2)}
.crow:last-child{border:none}
.crow .lb{color:var(--ink-2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.crow .vl{font-weight:500;color:var(--mts-ink);text-align:right;max-width:60%}

.mant-block{background:var(--bg-3);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
.mant-head{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.mant-head span{font-size:12px;font-weight:600;color:var(--mts-ink);text-transform:uppercase;letter-spacing:0.04em;flex:1}
.mant-badge{font-size:9px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--mts-warning-bg);color:#92400E}

.eq-row{display:flex;gap:8px;margin-bottom:12px}
.eq-btn{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-2);font-size:13px;font-weight:500;font-family:var(--font)}
.eq-btn.on{background:var(--mts-blue);color:#fff;border-color:var(--mts-blue)}

.causa-grid-m{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.causa-btn-m{padding:11px 10px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink-2);font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:7px;text-align:left}
.causa-btn-m.on{border-color:var(--mts-blue);background:#E3F0FC;color:var(--mts-ink);font-weight:500}
.causa-dot-m{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.field-grid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.field-grid select,.field-grid input,.field-grid textarea{width:100%;font-size:13px;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);color:var(--mts-ink);font-family:var(--font)}
.field-grid textarea{resize:none;height:64px}
.field-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-row2 select{font-size:12px;padding:11px 8px}

.section-lbl-m{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;display:flex;align-items:center;gap:5px}

.action-row-m{display:flex;gap:8px;margin-top:14px}
.action-row-m .tap-btn{height:48px;font-size:13px}

.reg-block{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px}
.reg-stamp{font-size:11px;color:var(--ink-3);font-family:var(--mono);margin-top:3px}
.alert-box{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:var(--mts-warning-bg);margin-top:12px;font-size:12px;color:#7C4B00}

.modal-bg-m{position:fixed;inset:0;background:rgba(67,68,72,.4);display:flex;align-items:flex-end;justify-content:center;z-index:99}
.modal-m{background:var(--surface);border-radius:18px 18px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-m h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--mts-ink)}
.modal-m label{font-size:11px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:4px;margin-top:10px;text-transform:uppercase;letter-spacing:0.04em}
.modal-m input,.modal-m select{width:100%;font-size:14px;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--bg-3);color:var(--mts-ink);font-family:var(--font)}
.modal-actions-m{display:flex;gap:8px;margin-top:16px}
.modal-actions-m button{flex:1;height:46px;border-radius:10px;font-size:13px;font-weight:500;font-family:var(--font)}

.toast-m{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--mts-ink);color:#fff;font-size:12px;font-weight:500;padding:9px 18px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;white-space:nowrap}
.toast-m.on{opacity:1}

/* desktop: cap width so it doesn't stretch ugly on wide screens */
@media (min-width:480px){
  .app-root{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.06)}
}

::-webkit-scrollbar{width:0;height:0}
</style>
</head>

let curTab="op",modCb=null,op={fam:null,grupo:null,cod:null,submitted:false},ms={equipo:null,causa:null,subcausa:null};

const byId=id=>POOL.find(c=>c.id===id);
const now=()=>new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

function setTab(t){
  curTab=t;
  document.getElementById("vcfg").style.display=t==="cfg"?"block":"none";
  document.getElementById("vop").style.display=t==="op"?"block":"none";
  document.getElementById("tc").classList.toggle("on",t==="cfg");
  document.getElementById("to").classList.toggle("on",t==="op");
  if(t==="op")rOp();
  if(t==="cfg")rFamList();
}

function rFamList(){
  const el=document.getElementById("famList");el.innerHTML="";
  tree.forEach(f=>el.appendChild(mkFamSection(f)));
  rStats();
}

function mkFamSection(f){
  const sec=document.createElement("div");sec.className="fam-section";
  const col=gc(f.name,"c"),bg=gc(f.name,"bg"),tx=gc(f.name,"tx");
  const activos=f.codes.filter(cid=>{const c=byId(cid);return c&&c.st!=="DESACTIVADO"}).length;

  const toggle=document.createElement("div");toggle.className="fam-toggle"+(f.exp?" exp":"");
  toggle.innerHTML=`<div class="fam-stripe" style="background:${col}"></div>
    <div class="fam-name">${f.name}</div>
    <span class="fam-count" style="background:${bg};color:${tx}">${activos}</span>
    <i class="ti ti-chevron-down fam-chev${f.exp?" up":""}" aria-hidden="true"></i>`;
  toggle.addEventListener("click",()=>{f.exp=!f.exp;rFamList()});
  sec.appendChild(toggle);

  const body=document.createElement("div");body.className="fam-body"+(f.exp?" show":"");
  if(f.exp){
    const grps={};
    f.codes.forEach(cid=>{const c=byId(cid);if(!c)return;const g=c.s1||"General";if(!grps[g])grps[g]=[];grps[g].push(c)});
    Object.entries(grps).forEach(([g,codes])=>{
      const gb=document.createElement("div");gb.className="grp-block";
      const many=Object.keys(grps).length>1;
      if(many){
        const lbl=document.createElement("div");lbl.className="grp-label";
        lbl.innerHTML=`<i class="ti ti-folder" aria-hidden="true"></i>${g}`;
        gb.appendChild(lbl);
      }
      codes.forEach(c=>gb.appendChild(mkCodeRow(c)));
      body.appendChild(gb);
    });
  }
  sec.appendChild(body);
  return sec;
}

function mkCodeRow(c){
  const r=document.createElement("div");r.className="code-row";
  const stCls=c.st==="ACTIVO"?"st-activo":c.st==="NUEVO"?"st-nuevo":"st-desact";
  const dim=c.st==="DESACTIVADO"?"opacity:.55;text-decoration:line-through;":"";
  r.style.cssText=dim;
  r.innerHTML=`<span class="code-id">${c.id}</span>
    <span class="code-name">${c.n}</span>
    <span class="code-badges">
      ${c.mant?`<i class="ti ti-tools mant-flag" aria-hidden="true"></i>`:""}
      <span class="st-dot ${stCls}"></span>
    </span>`;
  return r;
}

function rStats(){
  const all=tree.flatMap(f=>f.codes);
  const act=all.filter(cid=>{const c=byId(cid);return c&&c.st!=="DESACTIVADO"}).length;
  const des=all.length-act;
  const c2=all.filter(cid=>{const c=byId(cid);return c&&c.mant}).length;
  document.getElementById("sbar").innerHTML=`
    <div class="stat-card"><div class="stat-n ${act<=45?"stat-ok":"stat-wn"}">${act}</div><div class="stat-l">Activos</div></div>
    <div class="stat-card"><div class="stat-n stat-er">${des}</div><div class="stat-l">Desact.</div></div>
    <div class="stat-card"><div class="stat-n">${act?Math.round(c2/act*100):0}%</div><div class="stat-l">Capa mant.</div></div>`;
}

function resetOp(){op={fam:null,grupo:null,cod:null,submitted:false};ms={equipo:null,causa:null,subcausa:null};rOp()}

function rOp(){
  const wrap=document.getElementById("opsim");wrap.innerHTML="";
  if(op.submitted){renderReg(wrap);return}

  const famMap={};
  tree.forEach(f=>{
    const ac=f.codes.map(byId).filter(c=>c&&c.st!=="DESACTIVADO");
    if(!ac.length)return;
    const grps={};ac.forEach(c=>{const g=c.s1||"Gen";if(!grps[g])grps[g]=[];grps[g].push(c)});
    famMap[f.name]={grps,meta:FC[f.name]};
  });
  const fns=Object.keys(famMap);

  mkStep(wrap,1,"Familia de detención",false,true,()=>{
    const dw=document.createElement("div");dw.className="bigselect-wrap";
    const s=mkSel([{v:"",l:"Selecciona la familia…"},...fns.map(n=>({v:n,l:n}))],op.fam,v=>{op.fam=v||null;op.grupo=null;op.cod=null;rOp()});
    if(op.fam)s.classList.add("filled");
    dw.appendChild(s);dw.appendChild(mkArr());return dw;
  });
  if(!op.fam)return;
  addLine(wrap);

  const fd=famMap[op.fam];
  const gns=Object.keys(fd.grps);

  mkStep(wrap,2,"Sub-categoría",false,true,()=>{
    const outer=document.createElement("div");
    outer.appendChild(mkCrumb([{t:op.fam,bg:fd.meta.bg,tx:fd.meta.tx}]));
    const dw=document.createElement("div");dw.className="bigselect-wrap";
    const s=mkSel([{v:"",l:"Selecciona la sub-categoría…"},...gns.map(g=>({v:g,l:`${g} (${fd.grps[g].length})`}))],op.grupo,v=>{op.grupo=v||null;op.cod=null;rOp()});
    if(op.grupo)s.classList.add("filled");
    dw.appendChild(s);dw.appendChild(mkArr());outer.appendChild(dw);return outer;
  });
  if(!op.grupo)return;
  addLine(wrap);

  const cods=fd.grps[op.grupo];
  mkStep(wrap,3,"Código de detención",false,true,()=>{
    const outer=document.createElement("div");
    outer.appendChild(mkCrumb([{t:op.fam,bg:fd.meta.bg,tx:fd.meta.tx},{sep:1},{t:op.grupo,bg:"#F0F2F5",tx:"#434448"}]));
    const dw=document.createElement("div");dw.className="bigselect-wrap";
    const s=mkSel([{v:"",l:"Selecciona el código…"},...cods.map(c=>({v:c.id,l:`${c.id} — ${c.n}`}))],op.cod,v=>{op.cod=v||null;rOp()});
    if(op.cod)s.classList.add("filled");
    dw.appendChild(s);dw.appendChild(mkArr());outer.appendChild(dw);return outer;
  });
  if(!op.cod)return;
  addLine(wrap);

  const code=byId(op.cod);
  mkStep(wrap,4,"Confirmar declaración",false,true,()=>{
    const outer=document.createElement("div");
    const cc=document.createElement("div");cc.className="confirm-block";
    cc.innerHTML=`<div class="confirm-top">
      <div class="confirm-circle"><i class="ti ti-clipboard-check" style="font-size:18px;color:var(--mts-success)" aria-hidden="true"></i></div>
      <div><div class="confirm-title">${code.id} — ${code.n}</div><div class="confirm-sub">${op.fam} › ${op.grupo}</div></div>
    </div>
    <div class="confirm-rows">
      <div class="crow"><span class="lb">Familia</span><span class="vl">${op.fam}</span></div>
      <div class="crow"><span class="lb">Sub-categoría</span><span class="vl">${op.grupo}</span></div>
      <div class="crow"><span class="lb">Código</span><span class="vl" style="font-family:var(--mono)">${code.id}</span></div>
      <div class="crow"><span class="lb">Actor</span><span class="vl">${code.ac}</span></div>
      ${code.mant?`<div class="crow"><span class="lb">Capa 2 mant.</span><span class="vl" style="color:var(--mts-warning)">Pendiente</span></div>`:""}
    </div>`;
    outer.appendChild(cc);

    if(code.mant){
      const mb=document.createElement("div");mb.className="mant-block";
      mb.innerHTML=`<div class="mant-head"><i class="ti ti-tools" style="font-size:15px" aria-hidden="true"></i><span>Capa 2 — Mantenimiento</span><span class="mant-badge">post-intervención</span></div>`;

      const needsEq=["A01","A02","A03","A04","M01","M02"].includes(code.id);
      if(needsEq){
        const erow=document.createElement("div");erow.className="eq-row";
        EQUIPOS.forEach(eq=>{
          const btn=document.createElement("button");btn.className="eq-btn"+(ms.equipo===eq?" on":"");
          btn.textContent=eq;
          btn.addEventListener("click",()=>{ms.equipo=eq;ms.causa=null;ms.subcausa=null;rOp()});
          erow.appendChild(btn);
        });
        mb.appendChild(erow);
      }

      if(!needsEq||ms.equipo){
        const clbl=document.createElement("div");clbl.className="section-lbl-m";
        clbl.innerHTML=`<i class="ti ti-tag" aria-hidden="true"></i>Causa padre`;
        mb.appendChild(clbl);

        const cg=document.createElement("div");cg.className="causa-grid-m";
        Object.entries(MC).forEach(([causa,meta])=>{
          const btn=document.createElement("button");btn.className="causa-btn-m"+(ms.causa===causa?" on":"");
          btn.innerHTML=`<div class="causa-dot-m" style="background:${meta.color}"></div>${causa}`;
          btn.addEventListener("click",()=>{ms.causa=causa;ms.subcausa=null;rOp()});
          cg.appendChild(btn);
        });
        mb.appendChild(cg);

        if(ms.causa){
          const slbl=document.createElement("div");slbl.className="section-lbl-m";
          slbl.innerHTML=`<i class="ti ti-list" aria-hidden="true"></i>Sub-causa`;
          mb.appendChild(slbl);
          const sdw=document.createElement("div");sdw.className="bigselect-wrap";sdw.style.marginBottom="12px";
          const ss=mkSel([{v:"",l:"Selecciona la sub-causa…"},...MC[ms.causa].sub.map(s=>({v:s,l:s}))],ms.subcausa,v=>{ms.subcausa=v||null;rOp()});
          if(ms.subcausa)ss.classList.add("filled");
          sdw.appendChild(ss);sdw.appendChild(mkArr());mb.appendChild(sdw);
        }

        const flds=document.createElement("div");flds.className="field-grid";
        flds.innerHTML=`
          <div class="field-row2">
            <select><option>Equipo…</option><option>Llenadora L1</option><option>Llenadora L3</option><option>Llenadora L4</option><option>Etiq. L1</option><option>Etiq. L2</option><option>Etiq. L3</option><option>Etiq. L4</option></select>
            <select><option>Turno…</option><option>Turno A</option><option>Turno B</option><option>Turno C</option></select>
          </div>
          <input type="text" placeholder="Componente específico afectado">
          <textarea placeholder="Descripción libre de causa raíz y acción tomada…"></textarea>`;
        mb.appendChild(flds);
      }
      outer.appendChild(mb);
    }

    const ar=document.createElement("div");ar.className="action-row-m";
    ar.innerHTML=`<button class="tap-btn" style="flex:0 0 100px" onclick="resetOp()"><i class="ti ti-x" aria-hidden="true"></i>Cancelar</button>
      <button class="tap-btn primary" onclick="submitOp()"><i class="ti ti-check" aria-hidden="true"></i>Registrar</button>`;
    outer.appendChild(ar);
    return outer;
  });
}

function submitOp(){op.submitted=true;rOp()}

  const code=byId(op.cod);
  const fmeta=FC[op.fam];
  const t=now();
  const mantOk=code.mant&&ms.causa;
  const mantSummary=mantOk?`${ms.equipo||""}${ms.equipo?" › ":""}${ms.causa}${ms.subcausa?" › "+ms.subcausa:""}`:null;

function mkStep(c,num,lbl,dn,act,fn){
  const s=document.createElement("div");s.className="step-block";
  const hd=document.createElement("div");hd.className="step-head";
  const n=document.createElement("div");n.className="step-circle"+(dn?" dn":act?" act":"");
  n.innerHTML=dn?`<i class="ti ti-check" aria-hidden="true"></i>`:num;
  const l=document.createElement("div");l.className="step-text"+(act?" act":"");l.textContent=lbl;
  hd.appendChild(n);hd.appendChild(l);s.appendChild(hd);s.appendChild(fn());c.appendChild(s);
}
function addLine(c){const d=document.createElement("div");d.className="step-line";c.appendChild(d)}
function mkArr(){const a=document.createElement("i");a.className="ti ti-chevron-down bigselect-arrow";a.setAttribute("aria-hidden","true");return a}
function mkSel(opts,val,onChange){
  const s=document.createElement("select");s.className="bigselect";
  opts.forEach(o=>{const e=document.createElement("option");e.value=o.v;e.textContent=o.l;if(val===o.v)e.selected=true;s.appendChild(e)});
  s.addEventListener("change",()=>onChange(s.value));return s;
}
function mkCrumb(items){
  const r=document.createElement("div");r.className="crumb-row";
  items.forEach(it=>{
    if(it.sep){const sp=document.createElement("span");sp.className="crumb-sep";sp.textContent="›";r.appendChild(sp)}
    else{const c=document.createElement("span");c.className="crumb";c.style.background=it.bg;c.style.color=it.tx;c.textContent=it.t;r.appendChild(c)}
  });
  return r;
}

  showModal("Nuevo código",`
    <label>ID</label><input id="m-id" placeholder="P99">
    <label>Descripción</label><input id="m-n" placeholder="Nombre del motivo">
    <label>Familia</label><select id="m-f">${Object.keys(FC).map(f=>`<option>${f}</option>`).join("")}</select>
    <label>Sub-categoría</label><input id="m-s1" placeholder="PLANIFICACIÓN">
    <label>Estado</label><select id="m-st"><option>ACTIVO</option><option>NUEVO</option><option>DESACTIVADO</option></select>
    <label>Actor</label><select id="m-ac"><option>Operador</option><option>Operador → Mant.</option><option>Supervisor</option><option>Planificación</option><option>Sistema</option></select>
    <label>¿Capa 2 mantenimiento?</label><select id="m-mant"><option value="0">No</option><option value="1">Sí</option></select>`,
    ()=>{
      const id=document.getElementById("m-id").value.trim();
      const n=document.getElementById("m-n").value.trim();
      if(!id||!n){toast("ID y descripción obligatorios");return}
      if(POOL.find(c=>c.id===id)){toast("ID ya existe");return}
      POOL.push({id,n,f:document.getElementById("m-f").value,s1:document.getElementById("m-s1").value.trim(),
        st:document.getElementById("m-st").value,ac:document.getElementById("m-ac").value,
        mant:document.getElementById("m-mant").value==="1"});
      const fam=tree.find(x=>x.name===document.getElementById("m-f").value);
      if(fam&&!fam.codes.includes(id))fam.codes.push(id);
      closeModal();rFamList();toast("Código "+id+" creado");
    });
}

function openNF(){
  showModal("Nueva familia",`
    <label>Nombre</label><input id="m-fn" placeholder="NOMBRE FAMILIA">`,
    ()=>{
      const n=document.getElementById("m-fn").value.trim().toUpperCase();
      if(!n){toast("Nombre obligatorio");return}
      if(tree.find(f=>f.name===n)){toast("Ya existe");return}
      FC[n]={c:"#6B6E76",bg:"#F0F2F5",tx:"#434448"};
      tree.push({id:"f"+Date.now(),name:n,codes:[],exp:false});
      closeModal();rFamList();toast("Familia "+n+" creada");
    });
}

function showModal(title,body,onOk){
  const bg=document.createElement("div");bg.className="modal-bg-m";bg.id="modalBg";
  bg.addEventListener("click",e=>{if(e.target===bg)closeModal()});
  const m=document.createElement("div");m.className="modal-m";m.onclick=e=>e.stopPropagation();
  m.innerHTML=`<h3>${title}</h3><div>${body}</div>
    <div class="modal-actions-m">
      <button class="tap-btn" onclick="closeModal()">Cancelar</button>
      <button class="tap-btn primary" id="modalOkBtn">Confirmar</button>
    </div>`;
  bg.appendChild(m);
  document.body.appendChild(bg);
  document.getElementById("modalOkBtn").addEventListener("click",onOk);
}
function closeModal(){const m=document.getElementById("modalBg");if(m)m.remove()}

function doExp(){
  const all=tree.flatMap(f=>f.codes);
  const out={cliente:"Undurraga",version:"Propuesta v1",emitido:new Date().toLocaleString("es-CL"),
    motivos_mantencion:Object.fromEntries(Object.entries(MC).map(([k,v])=>[k,v.sub])),
    familias:tree.map(f=>({nombre:f.name,codigos:f.codes.map(cid=>{const c=byId(cid);return c?{id:c.id,descripcion:c.n,sub1:c.s1,estado:c.st,actor:c.ac,capa2_mantencion:c.mant}:{id:cid}})}))};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:"application/json"}));
  a.download="arbol_undurraga_v1.json";a.click();toast("JSON exportado");
}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2000)}

rOp();
</script>
